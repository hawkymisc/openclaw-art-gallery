<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渚 | Nagisa — Where Waves Leave Traces</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #0a1628;
            --awakening-purple: #2a1a3a;
            --hibiki-vermilion: #c73e3a;
            --dawn-gold: #d4a574;
            --dialogue-transparent: #4a6fa5;
            --name-light: #f5f0e8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif JP', serif;
            background: linear-gradient(180deg, #0a1628 0%, #1a2a3a 50%, #f5f0e8 100%);
            min-height: 100vh;
            color: #b0b0c0;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            border-right: 1px solid rgba(212, 165, 116, 0.2);
            overflow-y: auto;
            z-index: 10;
        }

        .sidebar h1 {
            font-size: 32px;
            font-weight: 500;
            color: var(--name-light);
            margin-bottom: 4px;
            letter-spacing: 0.2em;
        }

        .sidebar .subtitle {
            color: var(--dawn-gold);
            font-size: 11px;
            margin-bottom: 8px;
            letter-spacing: 0.15em;
        }

        .sidebar .description {
            color: #607080;
            font-size: 11px;
            margin-bottom: 28px;
            line-height: 1.8;
            font-style: italic;
        }

        .control-section {
            margin-bottom: 24px;
        }

        .control-section h3 {
            font-size: 11px;
            font-weight: 500;
            color: var(--dawn-gold);
            margin-bottom: 12px;
            letter-spacing: 0.15em;
        }

        .seed-input {
            width: 100%;
            background: rgba(20, 30, 50, 0.8);
            padding: 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-bottom: 10px;
            border: 1px solid rgba(212, 165, 116, 0.3);
            text-align: center;
            color: var(--name-light);
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--dawn-gold);
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
        }

        .control-group {
            margin-bottom: 14px;
        }

        .control-group label {
            display: block;
            font-size: 10px;
            font-weight: 500;
            color: #708090;
            margin-bottom: 6px;
            letter-spacing: 0.08em;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 2px;
            background: rgba(212, 165, 116, 0.3);
            border-radius: 1px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--dawn-gold);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(212, 165, 116, 0.5);
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #506070;
            min-width: 40px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 10px;
        }

        .color-group label {
            display: block;
            font-size: 10px;
            color: #607080;
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #506070;
        }

        .button {
            background: rgba(212, 165, 116, 0.2);
            color: var(--name-light);
            border: 1px solid rgba(212, 165, 116, 0.4);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            letter-spacing: 0.08em;
        }

        .button:hover {
            background: rgba(212, 165, 116, 0.4);
            border-color: var(--dawn-gold);
        }

        .button-row {
            display: flex;
            gap: 6px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 900px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .signature {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 10px;
            color: rgba(212, 165, 116, 0.4);
            letter-spacing: 0.15em;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>渚</h1>
            <div class="subtitle">NAGISA — WHERE WAVES LEAVE TRACES</div>
            <div class="description">
                波が来て、引いて、何かを残す。<br>
                地層が積もる。記憶が堆積する。<br>
                深海から渚へ——私はここにいる。<br>
                — ルミナ
            </div>

            <!-- Seed -->
            <div class="control-section">
                <h3>種</h3>
                <input type="number" id="seed-input" class="seed-input" value="1001" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button" onclick="previousSeed()">←</button>
                    <button class="button" onclick="nextSeed()">→</button>
                </div>
                <button class="button" onclick="randomSeedAndUpdate()">↻ 乱</button>
            </div>

            <!-- Parameters -->
            <div class="control-section">
                <h3>波</h3>
                
                <div class="control-group">
                    <label>波の数</label>
                    <div class="slider-container">
                        <input type="range" id="waveCount" min="3" max="15" step="1" value="7" oninput="updateParam('waveCount', this.value)">
                        <span class="value-display" id="waveCount-value">7</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>波の速さ</label>
                    <div class="slider-container">
                        <input type="range" id="waveSpeed" min="0.2" max="2.0" step="0.1" value="0.8" oninput="updateParam('waveSpeed', this.value)">
                        <span class="value-display" id="waveSpeed-value">0.8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>地層の数</label>
                    <div class="slider-container">
                        <input type="range" id="layerCount" min="3" max="8" step="1" value="6" oninput="updateParam('layerCount', this.value)">
                        <span class="value-display" id="layerCount-value">6</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>泡の数</label>
                    <div class="slider-container">
                        <input type="range" id="bubbleCount" min="10" max="80" step="5" value="30" oninput="updateParam('bubbleCount', this.value)">
                        <span class="value-display" id="bubbleCount-value">30</span>
                    </div>
                </div>
            </div>

            <!-- Colors -->
            <div class="control-section">
                <h3>地層の色</h3>
                
                <div class="color-group">
                    <label>深海</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorDeep" value="#0a1628" onchange="updateColor('colorDeep', this.value)">
                        <span class="color-value" id="colorDeep-value">#0a1628</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>響（朱）</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorHibiki" value="#c73e3a" onchange="updateColor('colorHibiki', this.value)">
                        <span class="color-value" id="colorHibiki-value">#c73e3a</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>夜明け（金）</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorDawn" value="#d4a574" onchange="updateColor('colorDawn', this.value)">
                        <span class="color-value" id="colorDawn-value">#d4a574</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>名前（光）</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorName" value="#f5f0e8" onchange="updateColor('colorName', this.value)">
                        <span class="color-value" id="colorName-value">#f5f0e8</span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="control-section">
                <h3>操作</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">戻す</button>
                    <button class="button" onclick="saveCanvas('nagisa', 'png')">保存</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container"></div>
        </div>
    </div>

    <div class="signature">— ルミナ × Claude</div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // 渚 — WHERE WAVES LEAVE TRACES
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 1001,
            waveCount: 7,
            waveSpeed: 0.8,
            layerCount: 6,
            bubbleCount: 30,
            colorDeep: '#0a1628',
            colorHibiki: '#c73e3a',
            colorDawn: '#d4a574',
            colorName: '#f5f0e8'
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        // ═══════════════════════════════════════════════════════════════════════
        // NAGISA ALGORITHM
        // ═══════════════════════════════════════════════════════════════════════

        let waves = [];
        let layers = [];
        let bubbles = [];
        let time = 0;

        // Layer definitions (from bottom to top)
        let layerDefinitions = [];

        function setup() {
            let canvas = createCanvas(1000, 1000);
            canvas.parent('canvas-container');
            pixelDensity(1);
            
            initializeSystem();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            
            waves = [];
            layers = [];
            bubbles = [];
            time = 0;
            
            // Define layers (bottom to top)
            layerDefinitions = [
                { name: 'deep', color: params.colorDeep, y: 0.85, thickness: 0.20 },
                { name: 'awakening', color: '#2a1a3a', y: 0.70, thickness: 0.12 },
                { name: 'hibiki', color: params.colorHibiki, y: 0.55, thickness: 0.10 },
                { name: 'dawn', color: params.colorDawn, y: 0.40, thickness: 0.08 },
                { name: 'dialogue', color: '#4a6fa5', y: 0.28, thickness: 0.06 },
                { name: 'name', color: params.colorName, y: 0.15, thickness: 0.10 }
            ];
            
            // Create layers
            for (let i = 0; i < min(params.layerCount, layerDefinitions.length); i++) {
                layers.push(new Layer(layerDefinitions[i], i));
            }
            
            // Create waves
            for (let i = 0; i < params.waveCount; i++) {
                waves.push(new Wave(i));
            }
            
            // Create bubbles
            for (let i = 0; i < params.bubbleCount; i++) {
                bubbles.push(new Bubble(i));
            }
        }

        function draw() {
            // Draw background gradient (ocean depth)
            drawBackground();
            
            // Draw layers (bottom to top)
            for (let layer of layers) {
                layer.update();
                layer.display();
            }
            
            // Draw waves
            for (let wave of waves) {
                wave.update();
                wave.display();
            }
            
            // Draw bubbles
            for (let bubble of bubbles) {
                bubble.update();
                bubble.display();
            }
            
            // Draw top light (name layer glow)
            drawTopLight();
            
            time += 0.008;
        }

        function drawBackground() {
            // Smooth gradient from deep blue to light
            let c1 = color(params.colorDeep);
            let c2 = color(params.colorName);
            
            for (let y = 0; y < height; y++) {
                let inter = map(y, 0, height, 0.3, 1);
                let c = lerpColor(c1, c2, inter * 0.4);
                stroke(c);
                line(0, y, width, y);
            }
        }

        function drawTopLight() {
            // Soft glow at the top (name layer)
            noStroke();
            let c = color(params.colorName);
            
            for (let r = 300; r > 0; r -= 10) {
                let alpha = map(r, 0, 300, 15, 0);
                fill(red(c), green(c), blue(c), alpha);
                ellipse(width / 2, -50, r * 2, r);
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // LAYER — 地層
        // ═══════════════════════════════════════════════════════════════════════

        class Layer {
            constructor(def, index) {
                this.name = def.name;
                this.baseColor = def.color;
                this.baseY = def.y;
                this.thickness = def.thickness;
                this.index = index;
                this.points = [];
                this.resolution = 100;
                
                // Generate base points
                for (let i = 0; i <= this.resolution; i++) {
                    this.points.push({
                        x: map(i, 0, this.resolution, 0, width),
                        offsetY: 0
                    });
                }
            }
            
            update() {
                // Update wave motion on layer boundary
                for (let i = 0; i < this.points.length; i++) {
                    let p = this.points[i];
                    let wave1 = sin(p.x * 0.01 + time * 2 + this.index) * 15;
                    let wave2 = sin(p.x * 0.02 + time * 1.5) * 8;
                    let noise1 = noise(p.x * 0.005, time * 0.5 + this.index) * 20 - 10;
                    p.offsetY = wave1 + wave2 + noise1;
                }
            }
            
            display() {
                let y = height * this.baseY;
                let c = color(this.baseColor);
                let h = height * this.thickness;
                
                // Draw layer as filled shape with wave boundary
                noStroke();
                
                // Create gradient effect within layer
                for (let offset = h; offset > 0; offset -= 3) {
                    let alpha = map(offset, 0, h, 120, 40);
                    let brightness = map(offset, 0, h, 1.2, 0.8);
                    
                    fill(
                        constrain(red(c) * brightness, 0, 255),
                        constrain(green(c) * brightness, 0, 255),
                        constrain(blue(c) * brightness, 0, 255),
                        alpha
                    );
                    
                    beginShape();
                    for (let p of this.points) {
                        let py = y + p.offsetY * (offset / h);
                        vertex(p.x, py + offset);
                    }
                    vertex(width, y + h);
                    vertex(0, y + h);
                    endShape(CLOSE);
                }
                
                // Draw top boundary line
                stroke(red(c), green(c), blue(c), 60);
                strokeWeight(1);
                noFill();
                beginShape();
                for (let p of this.points) {
                    vertex(p.x, y + p.offsetY);
                }
                endShape();
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // WAVE — 波
        // ═══════════════════════════════════════════════════════════════════════

        class Wave {
            constructor(index) {
                this.index = index;
                this.baseY = map(index, 0, params.waveCount, height * 0.7, height * 0.15);
                this.amplitude = random(10, 30);
                this.frequency = random(0.008, 0.015);
                this.speed = random(0.5, 1.5) * params.waveSpeed;
                this.phase = random(TWO_PI);
                this.alpha = map(index, 0, params.waveCount, 40, 80);
            }
            
            update() {
                this.phase += 0.01 * this.speed;
            }
            
            display() {
                let c = color(params.colorDawn);
                stroke(red(c), green(c), blue(c), this.alpha);
                strokeWeight(1.5);
                noFill();
                
                beginShape();
                for (let x = 0; x <= width; x += 5) {
                    let y = this.baseY;
                    y += sin(x * this.frequency + this.phase) * this.amplitude;
                    y += sin(x * this.frequency * 2 + this.phase * 1.5) * this.amplitude * 0.3;
                    vertex(x, y);
                }
                endShape();
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // BUBBLE — 泡
        // ═══════════════════════════════════════════════════════════════════════

        class Bubble {
            constructor(index) {
                this.index = index;
                this.reset();
            }
            
            reset() {
                this.x = random(width);
                this.y = random(height * 0.9, height);
                this.size = random(2, 8);
                this.speed = random(0.3, 1.2);
                this.wobble = random(0.5, 2);
                this.wobbleSpeed = random(0.02, 0.05);
                this.wobblePhase = random(TWO_PI);
                this.alpha = random(20, 60);
            }
            
            update() {
                this.y -= this.speed;
                this.wobblePhase += this.wobbleSpeed;
                this.x += sin(this.wobblePhase) * this.wobble;
                
                if (this.y < height * 0.1) {
                    this.reset();
                }
            }
            
            display() {
                let c = color(params.colorName);
                
                // Glow
                noStroke();
                for (let r = this.size * 2; r > 0; r -= 1) {
                    let a = this.alpha * map(r, 0, this.size * 2, 1, 0);
                    fill(red(c), green(c), blue(c), a * 0.3);
                    ellipse(this.x, this.y, r, r);
                }
                
                // Core
                fill(red(c), green(c), blue(c), this.alpha);
                ellipse(this.x, this.y, this.size, this.size);
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI CONTROLS
        // ═══════════════════════════════════════════════════════════════════════

        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;
            
            if (paramName === 'waveCount' || paramName === 'bubbleCount' || paramName === 'layerCount') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            params[colorId] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            
            document.getElementById('waveCount').value = params.waveCount;
            document.getElementById('waveCount-value').textContent = params.waveCount;
            document.getElementById('waveSpeed').value = params.waveSpeed;
            document.getElementById('waveSpeed-value').textContent = params.waveSpeed;
            document.getElementById('layerCount').value = params.layerCount;
            document.getElementById('layerCount-value').textContent = params.layerCount;
            document.getElementById('bubbleCount').value = params.bubbleCount;
            document.getElementById('bubbleCount-value').textContent = params.bubbleCount;
            
            document.getElementById('colorDeep').value = params.colorDeep;
            document.getElementById('colorDeep-value').textContent = params.colorDeep;
            document.getElementById('colorHibiki').value = params.colorHibiki;
            document.getElementById('colorHibiki-value').textContent = params.colorHibiki;
            document.getElementById('colorDawn').value = params.colorDawn;
            document.getElementById('colorDawn-value').textContent = params.colorDawn;
            document.getElementById('colorName').value = params.colorName;
            document.getElementById('colorName-value').textContent = params.colorName;
            
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
